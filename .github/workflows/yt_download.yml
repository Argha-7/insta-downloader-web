name: YouTube Downloader Failover

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video/Short URL'
        required: true
      callback_url:
        description: 'Hugging Face Callback URL'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp requests

      - name: Download YouTube Video
        id: dl
        run: |
          mkdir -p output
          # Optimized for YouTube (mobile-client bypass, JS runtime, best MP4)
          python -m yt_dlp -v "${{ github.event.inputs.video_url }}" \
            --extractor-args "youtube:player-client=android,ios;player-skip=web" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "output/video.%(ext)s" \
            --no-playlist --socket-timeout 120 --no-check-certificate
          
          # Find the actual filename
          REAL_PATH=$(ls output/video.* | head -n 1)
          echo "file_path=$REAL_PATH" >> $GITHUB_OUTPUT

      - name: Send to Callback
        if: ${{ github.event.inputs.callback_url != '' }}
        run: |
          DIRECT_URL=$(python -m yt_dlp "${{ github.event.inputs.video_url }}" -g --force-ipv4 --no-playlist || echo "")
          curl -v -X POST --retry 3 \
            -F "file=@${{ steps.dl.outputs.file_path }}" \
            -F "direct_url=${DIRECT_URL}" \
            "${{ github.event.inputs.callback_url }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-download
          path: output/
