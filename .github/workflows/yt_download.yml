name: YouTube Downloader Failover

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video/Short URL'
        required: true
      callback_url:
        description: 'Hugging Face Callback URL'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp requests

      - name: Debug Environment
        run: |
          python --version
          node -v
          pip --version

      - name: Setup Cookies
        id: setup_cookies
        env:
          MY_COOKIES: ${{ secrets['YT_COOKIES'] }}
        run: |
          if [ -n "$MY_COOKIES" ]; then
            echo "$MY_COOKIES" > youtube_cookies.txt
            echo "COOKIES_ARG=--cookies youtube_cookies.txt" >> $GITHUB_ENV
            echo "HAS_COOKIES=true" >> $GITHUB_OUTPUT
            echo "Cookies file created successfully."
            head -n 2 youtube_cookies.txt # Debug: show first 2 lines
          else
            echo "HAS_COOKIES=false" >> $GITHUB_OUTPUT
            echo "No YT_COOKIES secret found."
          fi

      - name: Install Standalone yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          # Symlink node to nodejs just in case yt-dlp is looking for that name
          NODE_EXE=$(which node)
          sudo ln -s "$NODE_EXE" /usr/local/bin/nodejs || true
          echo "yt-dlp version:"
          yt-dlp --version

      - name: Download YouTube Video
        id: dl
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          mkdir -p output
          echo "Starting download with cookies: ${{ steps.setup_cookies.outputs.HAS_COOKIES }}"
          
          # Force Node.js directory into PATH for the subprocess
          export PATH="$(dirname $(which node)):$PATH"
          echo "PATH for yt-dlp: $PATH"
          
          # Use ABSOLUTE PATH to standalone yt-dlp to avoid using the pip version
          /usr/local/bin/yt-dlp -v "${{ github.event.inputs.video_url }}" \
            $COOKIES_ARG \
            --extractor-args "youtube:player-client=tv,mweb,android,ios;player-skip=web,web_creator" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            --force-ipv4 \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "output/video.%(ext)s" \
            --no-playlist --socket-timeout 100 --no-check-certificate || {
              echo "YT-DLP FAILED! Check logic above."
              exit 1
            }
          
          # Find the actual filename
          REAL_PATH=$(ls output/video.* | head -n 1)
          if [ -z "$REAL_PATH" ]; then
             echo "ERROR: Video file not found in output directory."
             exit 1
          fi
          echo "file_path=$REAL_PATH" >> $GITHUB_OUTPUT

      - name: Send to Callback
        if: github.event.inputs.callback_url != ''
        run: |
          # Use same bypass logic (including cookies) for generating direct URL
          DIRECT_URL=$(python -m yt_dlp "${{ github.event.inputs.video_url }}" -g \
            $COOKIES_ARG \
            --extractor-args "youtube:player-client=web_creator,android,ios,mweb;player-skip=web" \
            --force-ipv4 --no-playlist || echo "FAILED_TO_GET_DIRECT_URL")
          
          curl -v -X POST --retry 3 \
            -F "file=@${{ steps.dl.outputs.file_path }}" \
            -F "direct_url=${DIRECT_URL}" \
            "${{ github.event.inputs.callback_url }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-download
          path: output/
